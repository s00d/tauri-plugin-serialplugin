"$schema" = "schemas/schema.json"
[default]
description = """
Default permissions for the serialplugin: enumerate, open, read/write, watch/unwatch,
port hotplug, AT session, exchange, and configure serial ports on desktop and Android.
"""
permissions = [
    "allow-managed-ports",
    "allow-available-ports",
    "allow-watch-ports",
    "allow-unwatch-ports",
    "allow-cancel-read",
    "allow-close",
    "allow-close-all",
    "allow-force-close",
    "allow-open",
    "allow-read",
    "allow-read-binary",
    "allow-write",
    "allow-write-binary",
    "allow-capabilities",
    "allow-watch",
    "allow-unwatch",
    "allow-bytes-to-read",
    "allow-bytes-to-write",
    "allow-clear-break",
    "allow-clear-buffer",
    "allow-read-carrier-detect",
    "allow-read-clear-to-send",
    "allow-read-data-set-ready",
    "allow-read-ring-indicator",
    "allow-set-baud-rate",
    "allow-set-break",
    "allow-set-data-bits",
    "allow-set-flow-control",
    "allow-set-parity",
    "allow-set-stop-bits",
    "allow-set-timeout",
    "allow-write-data-terminal-ready",
    "allow-write-request-to-send",
    "allow-set-log-level",
    "allow-get-log-level",
    "allow-exchange",
    "allow-exchange-binary",
    "allow-cancel-exchange",
    "allow-at",
    "allow-at-phases",
    "allow-send-sms-pdu",
    "allow-configure-at-session",
    "allow-enable-mux",
    "allow-open-mux-channel",
    "allow-disable-mux",
]
